<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dashboard">

    <!-- Theme toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle light / dark mode">
      <span id="theme-icon">🌙</span>
    </button>

    <!-- Greeting Card -->
    <section class="card greeting-card">
      <div class="time" id="clock">00:00:00</div>
      <div class="date" id="date">Day, Month Date, Year</div>
      <div class="greeting-row">
        <h1 id="greeting">Good Morning</h1>
        <span id="greeting-name"></span>
      </div>
      <div class="name-edit">
        <input type="text" id="name-input" placeholder="What's your name?" maxlength="20">
        <button id="name-save">Save</button>
      </div>
    </section>

    <div class="grid">

      <!-- Focus Timer Card -->
      <section class="card timer-card">
        <h2>Focus Timer</h2>
        <div class="timer-display" id="timer-display">25:00</div>

        <div class="timer-settings">
          <label for="timer-length">Session length (minutes)</label>
          <input type="number" id="timer-length" min="1" max="120" value="25">
        </div>

        <div class="timer-buttons">
          <button id="start-btn" class="btn btn-primary">Start</button>
          <button id="stop-btn" class="btn btn-secondary">Stop</button>
          <button id="reset-btn" class="btn btn-secondary">Reset</button>
        </div>
      </section>

      <!-- Tasks Card -->
      <section class="card tasks-card">
        <div class="tasks-header">
          <h2>Tasks</h2>
          <div class="sort-control">
            <label for="sort-select">Sort</label>
            <select id="sort-select">
              <option value="default">Default</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
              <option value="done">Done last</option>
            </select>
          </div>
        </div>

        <div class="task-input-row">
          <input type="text" id="task-input" placeholder="Add a new task...">
          <button id="add-task-btn" class="btn btn-primary">Add</button>
        </div>
        <p class="hint" id="duplicate-hint"></p>

        <ul class="task-list" id="task-list"></ul>
      </section>

      <!-- Quick Links Card -->
      <section class="card links-card">
        <h2>Quick Links</h2>
        <div class="link-input-row">
          <input type="text" id="link-name" placeholder="Link name">
          <input type="text" id="link-url" placeholder="URL">
          <button id="add-link-btn" class="btn btn-primary">Add Link</button>
        </div>
        <div class="links-list" id="links-list"></div>
      </section>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
